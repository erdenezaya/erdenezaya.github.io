name: Blog Automation

on:
  push:
    branches: [main]

jobs:
  update-toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update post list
        run: |
          echo "## 📝 All Posts" > TOC.md
          for file in _posts/*.md; do
            [ -f "$file" ] || continue
            title=$(grep 'title:' "$file" | head -1 | sed 's/title: //')
            date=$(echo "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            echo "- [$title] — $date" >> TOC.md
          done

      - name: Commit TOC
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add TOC.md
          git diff --cached --quiet || git commit -m "auto: update post list"
          git push