name: Blog Automation

on:
  push:
    branches: [main]        # triggers on every push

jobs:

  # ✅ Job 1: Build & Deploy to GitHub Pages
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Ruby (for Jekyll)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll Site
        run: bundle exec jekyll build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site

  # ✅ Job 2: Auto-generate Table of Contents in README
  update-toc:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v3

      - name: List all posts and update README
        run: |
          echo "## 📝 All Posts" > TOC.md
          for file in _posts/*.md; do
            title=$(grep 'title:' "$file" | head -1 | sed 's/title: //')
            date=$(echo "$file" | grep -oP '\d{4}-\d{2}-\d{2}')
            echo "- [$title] — $date" >> TOC.md
          done

      - name: Commit TOC update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add TOC.md
          git diff --cached --quiet || git commit -m "auto: update post list"
          git push
